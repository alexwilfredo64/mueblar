spring.config.import=optional:file:.env[.properties]

spring.application.name=BackendMueblar
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret-key=${JWT_SECRET}
security.jwt.expiration-time=${EXPIRATION_TIME}
security.jwt.expiration-time-app=${EXPIRATION_TIME_APP}

spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${API_EMAIL_KEY_SG}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.token.expiration=${EXPIRATION_TIME_RECOVERY_TOKEN}
